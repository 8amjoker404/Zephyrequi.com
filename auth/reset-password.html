<!DOCTYPE html>
<html lang="en">
<head>
<script src="../js/config.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zephyrequi - Reset Password</title>
  <link rel="stylesheet" href="https://unpkg.com/ionicons@4.5.10-0/dist/css/ionicons.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:500,700&display=swap">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- Reset Password Form -->
<form id="resetPasswordForm">
  <div class="segment">
    <h1>Reset Password</h1>
  </div>

  <div>
    <label>Email Address</label>
    <input type="email" id="resetEmail" readonly />
  </div>
  
  <div>
    <label>Enter OTP</label>
    <input type="text" id="otp" placeholder="Enter OTP" required />
  </div>

  <div>
    <label>New Password</label>
    <input type="password" id="newPassword" placeholder="Enter New Password" required />
  </div>

  <button class="red" type="submit"><i class="icon ion-md-lock"></i> Reset Password</button>

  <div class="login-links">
    <a href="login.html">Back to Login</a>
  </div>
</form>

<!-- Toast message div -->
<div id="toast" class="toast">
  <span id="toastMessage">message.</span>
  <button class="close-btn" onclick="closeToast()">×</button>
</div>

<!-- JavaScript -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const resetPasswordForm = document.getElementById("resetPasswordForm");
    const toast = document.getElementById("toast");
    const toastMessage = document.getElementById("toastMessage");

    // Get email from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get("email");

    if (email) {
      document.getElementById("resetEmail").value = email;
    }

    resetPasswordForm.addEventListener("submit", async function (event) {
      event.preventDefault(); // Prevent form refresh

      const otp = document.getElementById("otp").value;
      const newPassword = document.getElementById("newPassword").value;

      if (!otp || !newPassword) {
        showToast("Please enter OTP and new password.", "error");
        return;
      }

      try {
        const response = await fetch(`${window.API_BASE_URL}/auth/reset-password`, { // Replace with actual API URL
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ email, otp, newPassword }),
        });

        const data = await response.json();

        if (!response.ok) {
          showToast(data.message, "error");
          return;
        }

        showToast(data.message, "success");

        // Redirect to login after successful password reset
        setTimeout(function () {
          window.location.href = "login.html";
        }, 1500);

      } catch (error) {
        console.error("Error resetting password:", error);
        showToast("Something went wrong. Please try again.", "error");
      }
    });

    function showToast(message, type) {
      toastMessage.textContent = message;
      toast.classList.remove("success", "error");
      toast.classList.add(type);
      toast.style.opacity = 1;
      toast.style.top = '20px';

      // Hide the toast after 3 seconds
      setTimeout(function () {
        toast.style.opacity = 0;
        toast.style.top = '0px';
      }, 3000);
    }

    function closeToast() {
      toast.style.opacity = 0;
      toast.style.top = '0px';
    }
  });
</script>

</body>
</html>
