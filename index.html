
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>We’ll Be Back Soon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0b1220, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 15px;
      line-height: 1.5;
    }

    small {
      color: #64748b;
    }

    /* Loader */
    .loader {
      width: 50px;
      height: 50px;
      border: 4px solid #334155;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="loader"></div>

    <h1>We’ll Be Back Soon</h1>
    <p>
      Our site is currently getting an upgrade.<br />
      We’ll be online again shortly.
    </p>

    <small>Thank you for your patience 🤍</small>
  </div>
</body>
</html>
